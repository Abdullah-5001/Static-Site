name: Java CI Pipeline with Maven

# Trigger the pipeline whenever code is pushed to the main branch
on:
  push:
    branches: ["main"]

jobs:
  build:
    # Spin up an Ubuntu virtual machine
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the code from the repository
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 2: Set up the Java JDK environment
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      # Step 3: Run the Maven build command
      - name: Build and Test with Maven
        run: mvn clean package
